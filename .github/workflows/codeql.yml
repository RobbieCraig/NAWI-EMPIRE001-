P2P

echo "controllers created."

# Optionally run npm install (skippable by env var)
if [ "${SKIP_NPM_INSTALL:-false}" != "true" ]; then
  echo "Running npm install (this may take a moment)..."
  npm install
else
  echo "SKIP_NPM_INSTALL is true; skipping npm install in CI."
fi

# Stage changes safely without strict mapping crashes
git add package.json controllers/
if [ -f package-lock.json ]; then
  git add package-lock.json
fi

git commit -m "chore: add express-validator; add controllers to remove safeLoad warnings" || true
git push origin "${BRANCH}" --force

echo "Pushed branch ${BRANCH} to origin."
SCRIPT
          chmod +x run-harden.sh

      - name: Run run-harden.sh
        env:
          SKIP_NPM_INSTALL: ${{ env.SKIP_NPM_INSTALL }}
        run: |
          ./run-harden.sh

      - name: Create or update pull request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: add express-validator; add controllers to remove safeLoad warnings"
          title: "chore: add express-validator; controllers for core services"
          body: |
            Adds express-validator and minimal controllers to satisfy safeLoad and remove warnings.
            Updates package-lock.json if npm install ran in CI.
          base: main
          head: security/hardening-core
          branch: security/hardening-core
          labels: chore

      - name: Done
        run: echo "apply-hardening workflow completed."
