<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROFILE | NAWI-EMPIRE</title>
    
    <!-- External Assets -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        :root { --gold: #D4AF37; --black: #050505; --matte: #0A0A0A; --neon: #00ff41; }
        body { background: var(--black); color: white; font-family: 'Inter', sans-serif; padding-bottom: 100px; }

        /* Profile Header */
        .avatar-frame {
            width: 120px; height: 120px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            padding: 5px;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            margin: 0 auto;
            position: relative;
        }

        /* Sovereign Showcase Grid */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            margin-top: 20px;
        }
        .portfolio-item {
            aspect-ratio: 1/1;
            background: #111;
            border: 1px solid #1a1a1a;
            position: relative;
            overflow: hidden;
        }

        /* Settings Drawer */
        #settingsDrawer {
            position: fixed; top: 0; left: -100%;
            width: 85%; max-width: 350px; height: 100%;
            background: var(--matte); border-right: 1px solid var(--gold);
            z-index: 100; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px 20px;
        }

        /* Master Auth Overlay */
        #masterAuth {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.98); z-index: 999;
            flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(15px);
        }

        .auth-input {
            background: #000; border: 1px solid var(--gold);
            color: var(--gold); text-align: center;
            font-size: 2rem; letter-spacing: 15px;
            width: 200px; padding: 15px; border-radius: 15px; outline: none;
        }
    </style>
</head>
<body>

    <!-- 1. SETTINGS DRAWER (WALLET & VERIFICATION) -->
    <div id="settingsDrawer">
        <div class="flex justify-between items-center mb-10">
            <span class="text-[10px] font-black text-amber-500 tracking-[0.3em]">SYSTEM SETTINGS</span>
            <i class="fa-solid fa-xmark text-zinc-700 text-xl" onclick="toggleSettings()"></i>
        </div>
        
        <div class="bg-zinc-900/50 p-5 rounded-2xl border-l-4 border-amber-500 mb-6">
            <label class="text-[8px] text-zinc-500 uppercase font-black">Empire Wallet</label>
            <p id="wallet-balance" class="text-2xl font-black text-white mt-1">0.00 🪙</p>
            <button class="w-full mt-4 bg-amber-500 text-black py-3 rounded-xl font-black text-[10px] uppercase">Withdraw Assets</button>
        </div>

        <div class="bg-zinc-900/50 p-5 rounded-2xl border-l-4 border-zinc-700">
            <label class="text-[8px] text-zinc-500 uppercase font-black">Identity Verification</label>
            <p class="text-[10px] text-zinc-400 mt-2">Upload NIN or Govt ID to unlock Pillar 7 Commercial Rights.</p>
            <button class="w-full mt-4 border border-zinc-700 text-zinc-400 py-3 rounded-xl font-black text-[10px] uppercase">Upload ID</button>
        </div>
    </div>

    <!-- 2. MAIN PROFILE VIEW -->
    <header class="p-6 flex justify-between items-center">
        <i class="fa-solid fa-bars-staggered text-amber-500 text-xl" onclick="toggleSettings()"></i>
        <span class="text-[10px] font-black text-zinc-600 tracking-[0.3em]">IDENTITY VAULT</span>
        <i class="fa-solid fa-gear text-zinc-700"></i>
    </header>

    <div class="text-center pt-4">
        <!-- The Master Trigger (Long Press 3s) -->
        <div class="avatar-frame" id="masterTrigger">
            <img src="default-avatar.png" class="w-full h-full rounded-full object-cover grayscale" id="profile-img">
        </div>

        <div class="mt-6">
            <div class="flex items-center justify-center gap-2">
                <h1 id="display-username" class="text-xl font-black uppercase tracking-tighter">Citizen Node</h1>
                <i class="fa-solid fa-circle-check text-blue-500 hidden" id="v-badge"></i>
            </div>
            <p id="display-rank" class="text-amber-500 text-[9px] font-black uppercase tracking-widest mt-1">Apprentice Designer</p>
        </div>

        <!-- Professional Reputation Stats -->
        <div class="flex justify-center gap-10 mt-8 border-y border-zinc-900 py-6">
            <div class="text-center">
                <span id="asset-count" class="block font-black text-lg">0</span>
                <span class="text-[8px] text-zinc-600 uppercase font-bold">Renders</span>
            </div>
            <div class="text-center">
                <span id="trade-count" class="block font-black text-lg">0</span>
                <span class="text-[8px] text-zinc-600 uppercase font-bold">P2P Trades</span>
            </div>
            <div class="text-center">
                <span class="block font-black text-lg text-green-500">100%</span>
                <span class="text-[8px] text-zinc-600 uppercase font-bold">Reputation</span>
            </div>
        </div>
    </div>

    <!-- Sovereign Stylist Showcase -->
    <div class="px-2 mt-2">
        <div class="flex justify-between items-center px-4 py-4">
            <span class="text-[9px] font-black text-amber-500 tracking-widest uppercase border-l-2 border-amber-500 pl-3">Studio Showcase</span>
            <i class="fa-solid fa-table-cells-large text-zinc-700"></i>
        </div>
        <div class="portfolio-grid" id="portfolio-display">
            <!-- Dynamic Assets Injected Here -->
        </div>
    </div>

    <!-- 3. MASTER AUTH OVERLAY -->
    <div id="masterAuth">
        <i class="fa-solid fa-user-shield text-amber-500 text-5xl mb-6"></i>
        <h2 class="text-amber-500 font-black text-xs tracking-widest uppercase mb-8">Node 001 Authority</h2>
        <input type="password" id="masterKey" class="auth-input" maxlength="4" placeholder="••••">
        <button onclick="verifyMaster()" class="mt-8 bg-amber-500 text-black px-12 py-4 rounded-2xl font-black text-xs uppercase">Verify Sovereign</button>
        <p onclick="closeMasterAuth()" class="mt-8 text-zinc-600 text-[10px] font-black uppercase cursor-pointer">Cancel Session</p>
    </div>

    <!-- 4. BOTTOM NAVIGATION (ALL PILLARS) -->
    <nav class="fixed bottom-0 left-0 w-full bg-black/90 border-t border-zinc-900 flex justify-around p-5 z-50 backdrop-blur-xl">
        <a href="index.html" class="text-zinc-600"><i class="fa-solid fa-house text-xl"></i></a>
        <a href="market.html" class="text-zinc-600"><i class="fa-solid fa-store text-xl"></i></a>
        <a href="create-post.html" class="text-zinc-400"><i class="fa-solid fa-circle-plus text-3xl"></i></a>
        <a href="dashboard.html" class="text-zinc-600"><i class="fa-solid fa-chart-line text-xl"></i></a>
        <a href="profile.html" class="text-amber-500"><i class="fa-solid fa-user text-xl"></i></a>
    </nav>

    <script src="nawi_empire_v1.js"></script>
    <script>
        const currentUserID = localStorage.getItem('user-id') || 'NAWI-EMPIRE001';
        let pressTimer;

        // Long press trigger for Master Mode (3 Seconds)
        const trigger = document.getElementById('masterTrigger');
        trigger.addEventListener('mousedown', startPress);
        trigger.addEventListener('touchstart', startPress);
        trigger.addEventListener('mouseup', endPress);
        trigger.addEventListener('touchend', endPress);

        function startPress() {
            pressTimer = setTimeout(() => {
                document.getElementById('masterAuth').style.display = 'flex';
                if(navigator.vibrate) navigator.vibrate(100);
            }, 3000);
        }
        function endPress() { clearTimeout(pressTimer); }
        function closeMasterAuth() { document.getElementById('masterAuth').style.display = 'none'; }

        function verifyMaster() {
            const key = document.getElementById('masterKey').value;
            if(key === "0001") {
                window.location.href = "master-console.html"; // Your private command center
            } else {
                alert("ACCESS DENIED: NODE UNAUTHORIZED");
            }
        }

        function toggleSettings() {
            const drawer = document.getElementById('settingsDrawer');
            drawer.style.left = (drawer.style.left === "0px") ? "-100%" : "0px";
        }

        async function syncProfile() {
            try {
                const response = await fetch('https://nawi-empire1.onrender.com/api/get-profile', {
                    headers: { 'user-id': currentUserID }
                });
                const data = await response.json();
                
                if(data) {
                    document.getElementById('display-username').innerText = data.username || "Citizen Node";
                    document.getElementById('wallet-balance').innerText = `${(data.walletBalance || 0).toLocaleString()} 🪙`;
                    document.getElementById('asset-count').innerText = data.posts ? data.posts.length : 0;
                    
                    if(currentUserID === "NAWI-EMPIRE001") {
                        document.getElementById('v-badge').classList.remove('hidden');
                        document.getElementById('display-rank').innerText = "SYSTEM FOUNDER • NODE 001";
                    }

                    // Render Portfolio
                    const grid = document.getElementById('portfolio-display');
                    grid.innerHTML = data.posts.map(post => `
                        <div class="portfolio-item">
                            <img src="${post.imageUrl}" class="w-full h-full object-cover" onerror="this.src='gold-placeholder.png'">
                        </div>
                    `).join('');
                }
            } catch (err) {
                console.log("Syncing Profile Data...");
            }
        }

        window.onload = syncProfile;
    </script>
</body>
</html>
