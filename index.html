<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 PILLARS | SECURE NODE ACTIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; }
        .gold { color: #f59e0b; }
        .panel { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; }
        .gift-btn { background: linear-gradient(90deg, #f59e0b, #92400e); color: black; font-weight: 900; }
        .live-window { width: 100%; height: 200px; background: #050505; border-radius: 15px; border: 1px solid #222; position: relative; overflow: hidden; }
    </style>
</head>
<body class="pb-32">

    <div class="p-6 flex justify-between items-center border-b border-white/5">
        <h1 class="text-xs font-black tracking-[5px] gold uppercase">7 Pillars Node</h1>
        <div class="flex items-center gap-1">
            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
            <span class="text-[8px] text-emerald-500 font-bold">SECURE</span>
        </div>
    </div>

    <div class="p-4">
        <div class="live-window flex items-center justify-center">
            <div class="text-center">
                <i data-lucide="activity" class="text-zinc-700 w-12 h-12 mb-2 animate-pulse mx-auto"></i>
                <p class="text-[9px] text-zinc-500 tracking-widest uppercase italic">Imperial Stream Active</p>
            </div>
        </div>
    </div>

    <div class="px-4 grid grid-cols-3 gap-2 mb-6">
        <button onclick="gift(500)" class="gift-btn py-4 rounded-xl text-[8px]">₦500</button>
        <button onclick="gift(5000)" class="gift-btn py-4 rounded-xl text-[8px]">₦5K</button>
        <button onclick="gift(50000)" class="gift-btn py-4 rounded-xl text-[8px]">₦50K</button>
    </div>

    <div class="px-4 grid grid-cols-2 gap-3">
        <div onclick="alert('Reserve: 3.0M USD\nStatus: Verified')" class="panel p-5 flex flex-col items-center">
            <i data-lucide="shield-check" class="text-emerald-500 mb-1"></i>
            <span class="text-[8px] font-bold">RESERVE</span>
        </div>
        <div onclick="window.location.href='https://www.google.com/logos/2010/pacman10-i.html'" class="panel p-5 flex flex-col items-center">
            <i data-lucide="gamepad-2" class="text-purple-500 mb-1"></i>
            <span class="text-[8px] font-bold">GAMING</span>
        </div>
        <div onclick="alert('Menu: Active for Founders')" class="panel p-5 flex flex-col items-center">
            <i data-lucide="utensils" class="text-orange-500 mb-1"></i>
            <span class="text-[8px] font-bold">KITCHEN</span>
        </div>
        <div onclick="alert('Shop: Merch Store Open')" class="panel p-5 flex flex-col items-center">
            <i data-lucide="shopping-cart" class="text-blue-500 mb-1"></i>
            <span class="text-[8px] font-bold">SHOP</span>
        </div>
    </div>

    <div class="fixed bottom-0 w-full p-6 bg-black border-t border-white/10 flex justify-between items-center">
        <p class="text-[10px] font-black italic gold tracking-widest uppercase">7 PILLARS AUTHORITY</p>
        <button onclick="vault()" class="bg-zinc-800 text-[8px] px-5 py-2 rounded-full font-bold">VAULT</button>
    </div>

    <script>
        lucide.createIcons();
        function gift(n) {
            alert("7 PILLARS AUTHORITY:\nExchange initiated for ₦" + n + ".\n\nFunds will be moved from Public Node to Sovereign Vault.");
        }
        function vault() {
            let p = prompt("AUTHORITY KEY:");
            if(p === "NAWI-ALPHA-01") {
                alert("PRIVATE LEDGER: 35,000,000.00 USD\n\nDIRECTOR: IDENTITY ENCRYPTED\nSTATUS: TOTAL CONTROL");
            }
        }
    </script>
</body>
</html>
