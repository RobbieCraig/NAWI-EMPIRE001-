<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAWI-EMPIRE | Kitchen Authority</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #050505; --card: #111; --glass: rgba(255, 255, 255, 0.03); }
        body { background: var(--black); color: white; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 100px; }
        
        /* High-End Header */
        .kitchen-header { padding: 40px 20px; background: linear-gradient(to bottom, #111, #050505); border-bottom: 1px solid #222; text-align: center; }
        .kitchen-header h1 { color: var(--gold); font-size: 18px; letter-spacing: 4px; font-weight: 900; text-transform: uppercase; margin: 0; }
        .kitchen-header p { font-size: 10px; color: #555; margin-top: 10px; letter-spacing: 2px; font-weight: 800; }

        /* LIVE STREAM CONTAINER (The Real Deal) */
        .live-stream-area { margin: 20px; border-radius: 25px; background: #000; border: 1px solid var(--gold); overflow: hidden; position: relative; box-shadow: 0 0 30px rgba(212,175,55,0.1); }
        .stream-window { width: 100%; aspect-ratio: 16/9; background: #111; display: flex; align-items: center; justify-content: center; position: relative; }
        .stream-window img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        
        .live-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 15px; box-sizing: border-box; }
        .live-indicator { background: #ff0000; color: white; font-size: 9px; font-weight: 900; padding: 4px 10px; border-radius: 5px; width: fit-content; display: flex; align-items: center; gap: 5px; }
        .live-indicator span { width: 6px; height: 6px; background: white; border-radius: 50%; animation: pulse 1s infinite; }

        .stream-info { background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); padding: 15px; border-radius: 15px; border: 1px solid #222; }
        .stream-title { font-size: 13px; font-weight: 800; display: block; }
        .stream-host { font-size: 10px; color: var(--gold); font-weight: 700; }

        /* VENDOR MENU GRID */
        .section-title { padding: 0 25px; font-size: 12px; color: var(--gold); letter-spacing: 2px; font-weight: 900; text-transform: uppercase; margin: 30px 0 15px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .menu-card { background: var(--card); border-radius: 20px; border: 1px solid #1a1a1a; overflow: hidden; transition: 0.3s; }
        .menu-card img { width: 100%; height: 130px; object-fit: cover; border-bottom: 1px solid #222; }
        .menu-detail { padding: 15px; }
        .item-name { font-size: 13px; font-weight: 800; display: block; margin-bottom: 5px; }
        .item-price { color: var(--gold); font-size: 15px; font-weight: 900; display: block; margin-bottom: 12px; }
        
        .btn-order { background: var(--gold); color: black; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: 900; font-size: 10px; cursor: pointer; text-transform: uppercase; }

        /* MASTER NAVIGATION */
        .master-nav { position: fixed; bottom: 0; width: 100%; background: #080808; border-top: 1px solid #111; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav-box { text-align: center; color: #555; text-decoration: none; }
        .nav-box i { font-size: 20px; }
        .nav-box p { font-size: 9px; margin-top: 5px; font-weight: bold; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="kitchen-header">
        <h1>Empire Culinary Authority</h1>
        <p>RESERVED FOR THE FOUNDERS</p>
    </div>

    <div class="live-stream-area">
        <div class="stream-window">
            <img src="https://images.unsplash.com/photo-1556910103-1c02745aae4d?auto=format&fit=crop&w=800&q=80" alt="Live Chef">
            <div class="live-overlay">
                <div class="live-indicator"><span></span> LIVE STREAM</div>
                <div class="stream-info">
                    <span class="stream-title">Mastering Spicy Empire Pasta</span>
                    <span class="stream-host">Host: Chef Success</span>
                    <button class="btn-order" style="margin-top:10px; background:white;" onclick="P2P_GATEWAY.initiateTransaction('Live Cooking Session', 2)">JOIN STREAM (2 🪙)</button>
                </div>
            </div>
        </div>
    </div>

    <h2 class="section-title">Verified Menus</h2>
    
    <div class="menu-grid">
        <div class="menu-card">
            <img src="https://images.unsplash.com/photo-1604329760661-e71dc83f8f26?auto=format&fit=crop&w=400&q=80">
            <div class="menu-detail">
                <span class="item-name">Royal Jollof Rice</span>
                <span class="item-price">5 🪙</span>
                <button class="btn-order" onclick="P2P_GATEWAY.initiateTransaction('Royal Jollof Recipe', 5)">Unlock Menu</button>
            </div>
        </div>

        <div class="menu-card">
            <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=400&q=80">
            <div class="menu-detail">
                <span class="item-name">Empire Salad Mix</span>
                <span class="item-price">3 🪙</span>
                <button class="btn-order" onclick="P2P_GATEWAY.initiateTransaction('Salad Recipe', 3)">Unlock Menu</button>
            </div>
        </div>

        <div class="menu-card">
            <img src="https://images.unsplash.com/photo-1567620905732-2d1ec7bb7445?auto=format&fit=crop&w=400&q=80">
            <div class="menu-detail">
                <span class="item-name">Grilled Steak Kit</span>
                <span class="item-price">10 🪙</span>
                <button class="btn-order" onclick="P2P_GATEWAY.initiateTransaction('Grilled Steak Guide', 10)">Unlock Menu</button>
            </div>
        </div>

        <div class="menu-card">
            <img src="https://images.unsplash.com/photo-1551106652-a5bcf4b29ab6?auto=format&fit=crop&w=400&q=80">
            <div class="menu-detail">
                <span class="item-name">Founder Dessert</span>
                <span class="item-price">2 🪙</span>
                <button class="btn-order" onclick="P2P_GATEWAY.initiateTransaction('Dessert Menu', 2)">Unlock Menu</button>
            </div>
        </div>
    </div>

    <nav class="master-nav">
        <a href="index.html" class="nav-box"><i class="fa-solid fa-house"></i><p>Home</p></a>
        <a href="discover.html" class="nav-box"><i class="fa-solid fa-compass"></i><p>Explore</p></a>
        <a href="index.html" class="nav-box"><div style="background:var(--gold); width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-top:-10px;"><i class="fa-solid fa-plus" style="color:black;"></i></div></a>
        <a href="inbox.html" class="nav-box"><i class="fa-solid fa-message"></i><p>Inbox</p></a>
        <a href="profile.html" class="nav-box"><i class="fa-solid fa-user"></i><p>Profile</p></a>
    </nav>

    <script src="p2p-gateway.js"></script>
</body>
</html>
