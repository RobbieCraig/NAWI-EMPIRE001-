<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 PILLARS | HQ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --dark: #000; }
        body { background: var(--dark); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .hq-card { border: 1px solid var(--gold); padding: 40px 20px; border-radius: 20px; background: rgba(255,255,255,0.03); max-width: 350px; width: 90%; }
        .shield-icon { font-size: 50px; color: var(--gold); margin-bottom: 20px; }
        h1 { font-size: 18px; letter-spacing: 4px; margin-bottom: 10px; }
        p { color: #666; font-size: 12px; line-height: 1.6; }
        .status-dot { height: 8px; width: 8px; background: #0f0; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .back-btn { margin-top: 30px; color: var(--gold); text-decoration: none; font-size: 12px; font-weight: bold; border-bottom: 1px solid var(--gold); padding-bottom: 5px; }
    </style>
</head>
<body>
    <div class="hq-card">
        <div class="shield-icon"><i class="fa-solid fa-shield-halved"></i></div>
        <h1>7 PILLARS HQ</h1>
        <p><span class="status-dot"></span> SYSTEM SECURED & ACTIVE</p>
        <p style="margin-top: 20px; font-style: italic; color: #aaa;">"This is my order and my authority to protect the founders and this platform."</p>
        <a href="index.html" class="back-btn">RETURN TO FRONTEND</a>
    </div>
</body>
</html>
