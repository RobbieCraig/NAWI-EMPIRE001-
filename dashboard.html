<script>
    // 🧭 AUTHORIZED ORIENTATION SYSTEM
    // This script runs automatically to check for new Citizens
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const isNewUser = urlParams.get('new');
        
        // Only trigger the popup if the URL contains ?new=true
        if (isNewUser === 'true') { 
            showEmpireOrientation(); 
        }
    };

    function showEmpireOrientation() {
        // 1. Create the Dark Overlay
        const guideBox = document.createElement('div');
        guideBox.id = "imperial-overlay";
        guideBox.style.cssText = `
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.98); 
            z-index: 99999; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            backdrop-filter: blur(10px);
        `;

        // 2. Inject the Luxury Authority Card
        guideBox.innerHTML = `
            <div style="width: 85%; max-width: 400px; background: #0a0a0a; border: 1px solid #D4AF37; border-radius: 24px; padding: 35px; text-align: center; box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);">
                <div style="margin-bottom: 20px;">
                    <i class="fa-solid fa-gem" style="color:#D4AF37; font-size: 45px;"></i>
                </div>
                
                <h2 style="color:#D4AF37; font-family: sans-serif; font-size: 16px; font-weight: 900; letter-spacing: 4px; margin-bottom: 15px; text-transform: uppercase;">
                    Welcome to the Empire
                </h2>
                
                <p style="font-size: 12px; color: #a1a1a1; line-height: 1.6; margin-bottom: 25px;">
                    You have been granted <span style="color:#D4AF37; font-weight:bold;">10 Empire Coins</span> as a foundation bonus.
                </p>

                <div style="text-align: left; background: #111; padding: 20px; border-radius: 15px; margin-bottom: 25px;">
                    <p style="color: #eee; font-size: 10px; margin-bottom: 12px;">💎 <b>PILLAR 1:</b> Access the Marketplace.</p>
                    <p style="color: #eee; font-size: 10px; margin-bottom: 12px;">💎 <b>PILLAR 2:</b> Build your Studio.</p>
                    <p style="color: #eee; font-size: 10px; margin-bottom: 0;">💎 <b>PILLAR 3:</b> Connect with global Citizens.</p>
                </div>

                <button onclick="closeOrientation()" style="background:#D4AF37; color:black; border:none; width:100%; padding:18px; border-radius:14px; font-weight:900; font-size:12px; text-transform: uppercase; cursor:pointer; letter-spacing: 1px; transition: 0.3s active;">
                    Start My Journey
                </button>
            </div>
        `;

        document.body.appendChild(guideBox);
    }

    // 3. Close Function to remove overlay
    function closeOrientation() {
        const overlay = document.getElementById('imperial-overlay');
        if (overlay) {
            overlay.style.opacity = '0';
            overlay.style.transition = '0.5s';
            setTimeout(() => overlay.remove(), 500);
        }
    }
</script>
